<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID•FALL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            background: #0a001a;
            color: #00ffff;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        canvas {
            border: 6px solid #ff00cc;
            box-shadow: 0 0 30px #00ffff;
            image-rendering: pixelated;
            background: #000;
        }

        .side-panel {
            color: #fff;
            min-width: 200px;
        }

        .hud {
            font-size: 28px;
            text-shadow: 0 0 10px #00ffff;
        }

        .btn-neon {
            background: transparent;
            border: 3px solid #00ffff;
            color: #00ffff;
            padding: 10px 20px;
            font-family: 'VT323', monospace;
            font-size: 22px;
            margin: 5px;
        }

        .btn-neon:hover {
            background: #00ffff;
            color: #000;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ff00cc;
            font-size: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-container position-relative">
        <!-- Tablero -->
        <div>
            <canvas id="board" width="300" height="600"></canvas>
            <div id="overlay" class="overlay">
                <div id="overlay-text"></div>
                <button onclick="restart()" class="btn-neon mt-4">REINICIAR</button>
            </div>
        </div>

        <!-- Panel lateral -->
        <div class="side-panel">
            <h1 style="color:#ff00cc; text-shadow:0 0 15px #ff00cc;">VOID•FALL</h1>
            
            <div class="mb-3">
                <div>PUNTAJE</div>
                <div id="score" class="hud">000000</div>
            </div>
            
            <div class="mb-3">
                <div>LÍNEAS</div>
                <div id="lines" class="hud">00</div>
            </div>
            
            <div class="mb-3">
                <div>NIVEL</div>
                <div id="level" class="hud">01</div>
            </div>
            
            <div class="mb-4">
                <div>SIGUIENTE</div>
                <canvas id="next" width="120" height="120"></canvas>
            </div>

            <div>
                <button onclick="togglePause()" class="btn-neon w-100">PAUSA</button>
                <button onclick="restart()" class="btn-neon w-100">REINICIAR</button>
            </div>

            <div class="mt-4 small text-light">
                ← → : Mover<br>
                ↓ : Caer más rápido<br>
                Z / X : Rotar<br>
                ESPACIO : Caída instantánea
            </div>
        </div>
    </div>

    <script>
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextCtx = nextCanvas.getContext('2d');

        let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        let score = 0;
        let linesCleared = 0;
        let level = 1;
        let dropInterval = 800;
        let lastTime = 0;
        let gameOverState = false;
        let paused = false;
        let currentPiece = null;
        let nextPiece = null;

        const COLORS = [
            null,
            '#00ffff', // I
            '#ffff00', // O
            '#ff00ff', // T
            '#ff8800', // L
            '#0088ff', // J
            '#00ff00', // S
            '#ff0000'  // Z
        ];

        const PIECES = [
            null,
            [[1,1,1,1]],           // I
            [[1,1],[1,1]],         // O
            [[0,1,0],[1,1,1]],     // T
            [[1,0,0],[1,1,1]],     // L
            [[0,0,1],[1,1,1]],     // J
            [[0,1,1],[1,1,0]],     // S
            [[1,1,0],[0,1,1]]      // Z
        ];

        function createPiece() {
            const type = Math.floor(Math.random() * 7) + 1;
            return {
                type: type,
                shape: PIECES[type].map(row => [...row]),
                x: Math.floor(COLS / 2) - 1,
                y: 0
            };
        }

        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x * BLOCK_SIZE + 2, y * BLOCK_SIZE + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar bloques fijos
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(x, y, COLORS[board[y][x]]);
                    }
                }
            }
            
            // Dibujar pieza actual
            if (currentPiece) {
                const shape = currentPiece.shape;
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            drawBlock(currentPiece.x + x, currentPiece.y + y, COLORS[currentPiece.type]);
                        }
                    }
                }
            }
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;
            
            const shape = nextPiece.shape;
            const offsetX = (4 - shape[0].length) * 15;
            const offsetY = (4 - shape.length) * 15;
            
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        nextCtx.fillStyle = COLORS[nextPiece.type];
                        nextCtx.fillRect(offsetX + x*30, offsetY + y*30, 28, 28);
                    }
                }
            }
        }

        function collide(piece, testBoard = board) {
            const shape = piece.shape;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (!shape[y][x]) continue;
                    const newX = piece.x + x;
                    const newY = piece.y + y;
                    if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                    if (newY < 0) continue;
                    if (testBoard[newY][newX]) return true;
                }
            }
            return false;
        }

        function mergePiece() {
            const shape = currentPiece.shape;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        if (boardY >= 0) {
                            board[boardY][currentPiece.x + x] = currentPiece.type;
                        }
                    }
                }
            }
        }

        function clearLines() {
            let lines = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    lines++;
                    y++;
                }
            }
            if (lines > 0) {
                linesCleared += lines;
                score += [0, 100, 300, 500, 800][lines] * level;
                document.getElementById('lines').textContent = linesCleared.toString().padStart(2, '0');
                document.getElementById('score').textContent = score.toString().padStart(6, '0');
                
                if (linesCleared > level * 8) {
                    level++;
                    dropInterval = Math.max(200, dropInterval - 100);
                    document.getElementById('level').textContent = level.toString().padStart(2, '0');
                }
            }
        }

        function drop() {
            if (!currentPiece) return;
            currentPiece.y++;
            if (collide(currentPiece)) {
                currentPiece.y--;
                mergePiece();
                clearLines();
                currentPiece = nextPiece;
                nextPiece = createPiece();
                drawNext();
                
                if (collide(currentPiece)) {
                    gameOver();
                }
            }
        }

        function hardDrop() {
            while (!collide({...currentPiece, y: currentPiece.y + 1})) {
                currentPiece.y++;
                score += 2;
            }
            document.getElementById('score').textContent = score.toString().padStart(6, '0');
            drop();
        }

        function move(dir) {
            if (!currentPiece) return;
            currentPiece.x += dir;
            if (collide(currentPiece)) {
                currentPiece.x -= dir;
            }
        }

        function rotate() {
            if (!currentPiece) return;
            const original = currentPiece.shape;
            const rotated = original[0].map((_, i) => 
                original.map(row => row[i]).reverse()
            );
            currentPiece.shape = rotated;
            if (collide(currentPiece)) {
                currentPiece.shape = original;
            }
        }

        function gameLoop(time = 0) {
            if (gameOverState || paused) {
                requestAnimationFrame(gameLoop);
                return;
            }

            if (time - lastTime > dropInterval) {
                drop();
                lastTime = time;
            }

            drawBoard();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameOverState = true;
            document.getElementById('overlay-text').innerHTML = `GAME OVER<br>PUNTAJE: ${score}`;
            document.getElementById('overlay').style.display = 'flex';
        }

        function togglePause() {
            paused = !paused;
        }

        function restart() {
            board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
            score = 0;
            linesCleared = 0;
            level = 1;
            dropInterval = 800;
            gameOverState = false;
            paused = false;
            
            document.getElementById('score').textContent = '000000';
            document.getElementById('lines').textContent = '00';
            document.getElementById('level').textContent = '01';
            document.getElementById('overlay').style.display = 'none';
            
            nextPiece = createPiece();
            currentPiece = createPiece();
            drawNext();
            drawBoard();
            lastTime = performance.now();
            gameLoop();
        }

        // Controles de teclado
        document.addEventListener('keydown', e => {
            if (gameOverState || paused) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    move(-1);
                    break;
                case 'ArrowRight':
                    move(1);
                    break;
                case 'ArrowDown':
                    drop();
                    break;
                case ' ':
                    hardDrop();
                    break;
                case 'z':
                case 'Z':
                case 'x':
                case 'X':
                    rotate();
                    break;
            }
            drawBoard();
        });

        // Iniciar el juego
        window.onload = () => {
            nextPiece = createPiece();
            currentPiece = createPiece();
            drawNext();
            drawBoard();
            gameLoop();
        };
    </script>
</body>
</html>
